---
# Annotations only — configuration files are not touched (JSpecify nullable)
type: specs.openrewrite.org/v1beta/recipe
name: io.github.benjaminknauer.rewrite.swagger.SpringdocOpenApi31AnnotationsOnlyRecipe
displayName: Migrate springdoc-openapi Swagger annotations to OpenAPI 3.1 (without properties/yml)
description: >
  Migrates only Java annotations (@Schema nullable → @Nullable, exclusiveMinimum/Maximum, example)
  to OpenAPI 3.1. application.properties and application.yml are not changed.
  Suitable when the configuration has already been set manually or is managed
  by a separate configuration management system.
  Uses JSpecify @Nullable for nullable fields without an explicit type (useJSpecifyNullable: true).
tags:
  - openapi
  - swagger
  - springdoc
  - migration
estimatedEffortPerOccurrence: PT10M
recipeList:
  - io.github.benjaminknauer.rewrite.swagger.SpringdocOpenApi31Recipe:
      enableOpenApi31Properties: false

---
# Minimal migration — without example migration (JSpecify nullable)
type: specs.openrewrite.org/v1beta/recipe
name: io.github.benjaminknauer.rewrite.swagger.SpringdocOpenApi31MinimalRecipe
displayName: Migrate springdoc-openapi 2.x to OpenAPI 3.1 (minimal — without example)
description: >
  Performs only the migrations required for OA 3.1 correctness: application.properties/yml,
  nullable and exclusiveMinimum/Maximum. The example→examples migration is intentionally
  excluded — use this preset if any consumers of your API spec look for the singular
  'example' field and cannot yet handle the 'examples' array form.
  Uses JSpecify @Nullable for nullable fields without an explicit type (useJSpecifyNullable: true).
tags:
  - openapi
  - swagger
  - springdoc
  - migration
estimatedEffortPerOccurrence: PT10M
recipeList:
  - io.github.benjaminknauer.rewrite.swagger.SpringdocOpenApi31Recipe:
      migrateExamples: false

---
# Types-array migration — @Schema(nullable=true) → @Schema(types={"T","null"}) for all fields
type: specs.openrewrite.org/v1beta/recipe
name: io.github.benjaminknauer.rewrite.swagger.SpringdocOpenApi31TypesArrayRecipe
displayName: Migrate springdoc-openapi 2.x to OpenAPI 3.1 (types-array nullable)
description: >
  Full migration using the types-array strategy for all nullable fields:
  @Schema(nullable=true) → @Schema(types={"T","null"}) regardless of whether
  an explicit 'type' attribute is present. No new runtime dependency is added.
  Use SpringdocOpenApi31Recipe (default) instead if you prefer @Nullable (JSpecify).
tags:
  - openapi
  - swagger
  - springdoc
  - migration
estimatedEffortPerOccurrence: PT15M
recipeList:
  - io.github.benjaminknauer.rewrite.swagger.SpringdocOpenApi31Recipe:
      useJSpecifyNullable: false

---
